<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title >Library Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .form-container {
      width: 400px;
      margin: auto;
      background-color: #0b6e86;
      padding: 20px;
      border-radius: 10px;
      color: aliceblue;
    }
    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="submit"],
    textarea {
      width: 97%;
      padding: 8px;
      margin: 9px 0 15px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    textarea {
      height: 80px;
    }
    label {
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="form-container">
  <h2>Library Registration Form</h2>
  
  <form>
    <label>Full Name</label>
    <input type="text" placeholder="Enter your full name" required>

    <label>Email Address</label>
    <input type="email" placeholder="Enter your email address" required>

    <label>Phone Number</label>
    <input type="tel" placeholder="Enter your phone number" required>

    <label>Membership</label><br>
    <input type="radio" name="membership" value="student"> Student
    <input type="radio" name="membership" value="staff"> Staff
    <input type="radio" name="membership" value="senior"> Senior<br><br>

    <label>Preferred Genres (Select all that apply)</label><br>
    <input type="checkbox" name="genre" value="fiction"> Fiction
    <input type="checkbox" name="genre" value="nonfiction"> Non-Fiction<br><br>

    <label>Comments (Optional)</label>
    <textarea placeholder="Any additional remarks..."></textarea><br>

    <input type="submit" value="Register" style="width: 407px ;">
  </form>
</div>

</body>
</html>
