<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Staggered Colored Blocks</title>
  <style>
    .container {
      display: flex;
      flex-wrap: wrap;
      width: 300px;
      margin: 50px auto;
    }
    .block {
      width: 100px;
      height: 100px;
      margin: 10px;
      border-radius: 8px;
    }
    .block1 { 
      background-color: #ff6666; /* Red */
      margin-top: 0px; /* higher */
    }
    .block2 { 
      background-color: #66b3ff; /* Blue */
      margin-top: 20px; /* lower */
    }
    .block3 { 
      background-color: #99ff99; /* Green */
      margin-top: 30px; /* higher in second row */
    }
    .block4 { 
      background-color: #ffcc99; /* Orange */
      margin-top: 50px; /* lower */
    }
  </style>
</head>
<body>

<div class="container">
  <div class="block block1"></div>
  <div class="block block2"></div>
  <div class="block block3"></div>
  <div class="block block4"></div>
</div>

</body>
</html>
