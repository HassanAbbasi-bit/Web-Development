<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Structure</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            text-align: center;
        }
        td, th {
            border: 4px solid blue;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h3>Table Structure</h3>
    <table>
        <tr>
            <th colspan="4">CE - 8</th>
        </tr>
        <tr>
            <td rowspan="2">(CE-1)</td>
            <td>A</td>
            <td>B</td>
            <td rowspan="2">C</td>
        </tr>
        <tr>
            <td>D</td>
            <td>E</td>
        </tr>
        <tr>
            <td rowspan="2">(CE-2)</td>
            <td>G</td>
            <td>H</td>
            <td>I</td>
        </tr>
        <tr>
            <td>F</td>
            <td>K</td>
            <td>L</td>
        </tr>
    </table>

</body>
</html>
