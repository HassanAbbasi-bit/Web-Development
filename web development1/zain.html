<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random GPA Table</title>
    <style>
        table {
            width: 50%;
            border-collapse: collapse;
            margin: 20px auto;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
        }
        th {
            background-color: lightgray;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center;"> Student Subjects</h2>

    <table>
        <!-- Empty heading row -->
        <tr>
            <th colspan="4"> <marquee>zain jaccobi</marquee></th>
        </tr>

       
        <tr>
            <td rowspan="2">CE1</td>
            <td>A (Math)</td>
            <td>B (Science)</td>
            <td>C (English)</td>
	    
        </tr>
        <tr>
            <td>D (History)</td>
            <td>E (Physics)</td>
            <td>F (Chemistry)</td>
        </tr>

       
        <tr>
            <td rowspan="2">CE2</td>
            <td>G (Math)</td>
            <td>H (Science)</td>
            <td>I (English)</td>
        </tr>
        <tr>
            <td>J (History)</td>
            <td>K (Physics)</td>
            <td>L (Chemistry)</td>
        </tr>
    </table>

</body>
</html>
