<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Record</title>
    <style>
        table {
            width: 50%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #eb8c8c;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #52f9ff;
        }
        caption {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <table>

        
        <thead>
            <tr>
                <th colspan="5"></th>
            </tr>
            
 
            <tr>
                <th rowspan="2">Student ID</th>
                <th rowspan="2">Student Name</th>
                <th colspan="2">Quizzes</th>
                <th rowspan="2">Total Marks</th>
            </tr>
            <tr>
                <th>Quiz 1</th>
                <th>Quiz 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Saman Aziz</td>
                <td>10</td>
                <td>9</td>
                <td>45</td> 
            </tr>
            <tr>
                <td>2</td>
                <td>Lavizah Qazi</td>
                <td>8</td>
                <td>7</td>
                <td>50</td> 
            </tr>
        </tbody>
    </table>

</body>
</html>
